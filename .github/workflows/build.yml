name: Build Windows

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: windows
          target: desktop
          arch: win64_mingw81

      - name: Build
        shell: cmd
        run: |
          qmake dashmaster.pro
          mingw32-make

      - name: Find executable
        id: findexe
        shell: powershell
        run: |
          $exe = Get-ChildItem -Recurse -Filter *.exe |
            Where-Object {
              $_.Name -notmatch "assistant|designer|linguist|qmake|moc|uic|rcc"
            } |
            Select-Object -First 1

          if (-not $exe) {
            throw "Executable not found."
          }

          "exe=$($exe.FullName)" >> $env:GITHUB_OUTPUT
          "dir=$($exe.Directory.FullName)" >> $env:GITHUB_OUTPUT

      - name: Deploy Qt
        shell: powershell
        run: |
          call "%Qt5_DIR%\bin\qtenv2.bat"
          windeployqt `
            --release `
            --compiler-runtime `
            "${{ steps.findexe.outputs.exe }}"

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path "${{ steps.findexe.outputs.dir }}\*" `
            -DestinationPath E34dash-Windows.zip `
            -Force

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: E34dash-Windows
          path: E34dash-Windows.zip
