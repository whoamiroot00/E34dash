name: Build Windows

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: windows
          target: desktop
          arch: win64_mingw81

      - name: Build
        shell: cmd
        run: |
          qmake dashmaster.pro
          mingw32-make

      - name: Package application
        shell: powershell
        run: |
          $QtRoot = Split-Path (Split-Path $env:Qt5_DIR)

          Write-Host "Qt root: $QtRoot"

          $Package = "package"
          New-Item -ItemType Directory -Force $Package | Out-Null
          New-Item -ItemType Directory -Force "$Package\platforms" | Out-Null

          # Find executable
          $Exe = Get-ChildItem -Recurse -Filter *.exe |
              Where-Object {
                  $_.Name -notmatch "assistant|designer|linguist|qmake|uic|moc|rcc"
              } |
              Select-Object -First 1

          if (-not $Exe) {
              throw "Executable not found."
          }

          Copy-Item $Exe.FullName $Package

          # Qt DLLs
          Copy-Item "$QtRoot\bin\Qt5Core.dll" $Package
          Copy-Item "$QtRoot\bin\Qt5Gui.dll" $Package
          Copy-Item "$QtRoot\bin\Qt5Widgets.dll" $Package

          # Platform plugin
          Copy-Item "$QtRoot\plugins\platforms\qwindows.dll" "$Package\platforms"

          # MinGW runtime DLLs
          $gcc = Get-Command g++.exe

          $mingwBin = Split-Path $gcc.Source

          Copy-Item "$mingwBin\libstdc++-6.dll" $Package
          Copy-Item "$mingwBin\libgcc_s_seh-1.dll" $Package
          Copy-Item "$mingwBin\libwinpthread-1.dll" $Package

      - name: Create ZIP
        shell: powershell
        run: |
          Compress-Archive `
            -Path package\* `
            -DestinationPath E34dash-Windows.zip `
            -Force

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: E34dash-Windows
          path: E34dash-Windows.zip
