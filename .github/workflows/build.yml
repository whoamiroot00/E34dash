name: Build Windows Executable

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'

      - name: Setup MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      - name: Run qmake
        shell: cmd
        run: |
          qmake E34dash.pro

      - name: Build
        shell: cmd
        run: |
          mingw32-make -j2

      - name: Collect executable
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force artifacts
          Get-ChildItem -Recurse -Filter *.exe |
            Where-Object { $_.Name -notmatch "assistant|designer|linguist|qmake" } |
            Copy-Item -Destination artifacts

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: E34dash-Windows
          path: artifacts
